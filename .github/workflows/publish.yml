name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # required for PyPI trusted publishing

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Extract version from pyproject.toml
        id: get_version
        working-directory: app_server
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "project_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project version: $VERSION"

      - name: Extract tag version
        id: get_tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG_VERSION#v}
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $TAG_VERSION"

      - name: Verify version matches tag
        run: |
          if [ "${{ steps.get_version.outputs.project_version }}" != "${{ steps.get_tag.outputs.tag_version }}" ]; then
            echo "ERROR: Tag version (${{ steps.get_tag.outputs.tag_version }}) doesn't match pyproject.toml version (${{ steps.get_version.outputs.project_version }})"
            exit 1
          fi
          echo "Version verification passed"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: 'web_ui/.nvmrc'

      - name: Install frontend dependencies
        working-directory: web_ui
        run: npm ci

      - name: Build Angular app
        working-directory: web_ui
        run: |
          npx ng build \
            --output-path="../app_server/src/litpose_app/ngdist/ng_app" \
            --deploy-url="/static/"

      - name: Install build tool
        run: pip install build

      - name: Build Python wheel
        working-directory: app_server
        run: python -m build .

      - name: Verify build contents
        working-directory: app_server
        run: |
          echo "Built packages:"
          ls -la dist/
          echo "Checking wheel contents:"
          python -m zipfile -l dist/*.whl | head -20

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: app_server/dist/

      - name: Confirm publication
        run: |
          echo "Successfully published lightning-pose-app v${{ steps.get_version.outputs.project_version }} to PyPI"
          echo "https://pypi.org/project/lightning-pose-app/${{ steps.get_version.outputs.project_version }}/"

<alert-dialog-layout #dialog>
  <alert-dialog-header>
    <alert-dialog-title>Are you sure?</alert-dialog-title>
  </alert-dialog-header>

  <p>This action cannot be undone.</p>

  <alert-dialog-footer>
    <button (click)="handleCancelClick()">Cancel</button>
  </alert-dialog-footer>
</alert-dialog-layout>

<style>
  :host {
    display: flex;
    flex-grow: 1;
    justify-content: center;
    width: 100%;
  }
</style>
<!--<div class="flex mt-4 w-full">-->
<as-split unit="pixel" direction="horizontal">
  <as-split-area size="620">
    <div class="min-w-lg mt-4">
      <div class="flex gap-2 items-center m-4">
        <app-dropdown #createDropdown>
          <app-dropdown-trigger>
            <button
              appDropdownTrigger
              class="btn btn-primary"
              tabindex="0"
            >
              New model
            </button>
          </app-dropdown-trigger>
          <app-dropdown-content>
            <ul class="menu p-2 w-52" tabindex="0">
              <li>
                <button
                  (click)="isCreateModelDialogOpen.set(true); createDropdown.close()"
                >
                  Training model
                </button>
              </li>
              <li>
                <button
                  (click)="isCreateEksModelDialogOpen.set(true); createDropdown.close()"
                >
                  EKS ensemble model
                </button>
              </li>
            </ul>
          </app-dropdown-content>
        </app-dropdown>
        <app-dropdown #dropdown>
          <app-dropdown-trigger>
            <button
              appDropdownTrigger
              class="btn btn-accent"
              [class.btn-disabled]="selectedModel() === null"
              tabindex="0"
            >
              Actions
            </button>
          </app-dropdown-trigger>
          <app-dropdown-content>
            <ul class="menu p-2 w-52" tabindex="0">
              <li>
                <button
                  (click)="openInferenceDialog(); dropdown.close()"
                  [disabled]="!selectedModel()"
                >
                  Run inference
                </button>
              </li>
            </ul>
          </app-dropdown-content>
        </app-dropdown>
      </div>

      <div class="overflow-auto max-h-5/6">
        <app-models-list
          [(selectedModel)]="selectedModel"
          [(actionSelectedModels)]="selectedModelsForAction"
        ></app-models-list>
      </div>
    </div>
  </as-split-area>
  <as-split-area size="*">
    <app-model-detail [selectedModel]="selectedModel()"></app-model-detail>
  </as-split-area>
</as-split>
@if (isCreateModelDialogOpen()) {
  <app-create-model-dialog
    (done)="handleCreateModelDialogDone($event)"
  ></app-create-model-dialog>
}
@if (isCreateEksModelDialogOpen()) {
  <app-create-eks-model-dialog
    (done)="handleCreateEksModelDialogDone($event)"
  ></app-create-eks-model-dialog>
}
@if (isInferenceDialogOpen()) {
  <app-model-inference-dialog
    [modelRelativePath]="selectedModel()?.model_relative_path ?? ''"
    [modelKind]="selectedModel()?.model_kind ?? 'normal'"
    (done)="handleInferenceDialogDone()"
  ></app-model-inference-dialog>
}

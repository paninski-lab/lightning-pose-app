<app-alert-dialog (close)="closeDialog()">
  <app-alert-header>
    <span class="text-error">
      Delete Model:
      <code class="text-base-content">{{ modelRelativePath() }}</code>
    </span>
  </app-alert-header>

  <div class="prose">
    <p>
      This will permanently delete the model's directory containing its
      configuration, weights, and prediction outputs.
    </p>
    <div class="flex gap-2">
      <input
        id="deleteConfirmation"
        name="deleteConfirmation"
        type="checkbox"
        class="checkbox"
        [(ngModel)]="deleteConfirmation"
      />
      <label for="deleteConfirmation" class="cursor-pointer"
        >I want to permanently delete
        <code>{{ modelRelativePath() }}</code></label
      >
    </div>
  </div>

  <app-alert-footer>
    <button class="btn btn-error" (click)="closeDialog()">Cancel</button>
    <button
      class="btn btn-primary"
      (click)="handleDelete()"
      [disabled]="!deleteConfirmation()"
    >
      Delete Permanently
    </button>
  </app-alert-footer>
</app-alert-dialog>
